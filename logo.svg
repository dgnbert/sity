<svg width="420" height="72" viewBox="0 0 420 72" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <clipPath id="iconClip">
      <rect x="0" y="4" width="64" height="64" rx="16"/>
    </clipPath>
  </defs>

  <!-- Horse icon from logos.png -->
  <image href="logos.png" x="0" y="4" width="64" height="64" clip-path="url(#iconClip)" preserveAspectRatio="xMidYMid slice"/>

  <!-- Text -->
  <text
    x="82" y="34"
    font-family="Inter, Helvetica Neue, sans-serif"
    font-size="23"
    font-weight="800"
    letter-spacing="3"
    fill="url(#textGrad)"
  >BUCEPHALUS</text>

  <line x1="82" y1="41" x2="415" y2="41" stroke="#E2E8F0" stroke-width="1"/>

  <text
    x="83" y="57"
    font-family="Inter, Helvetica Neue, sans-serif"
    font-size="10"
    font-weight="400"
    letter-spacing="2.5"
    fill="#64748B"
  >НЕЙРОАВТОМАТИЗАЦИЯ ДЛЯ БИЗНЕСА</text>
</svg>
